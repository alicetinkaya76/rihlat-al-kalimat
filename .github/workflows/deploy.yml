name: Deploy to GitHub Pages

# Riḥlat al-Kalimāt — GitHub Pages deploy workflow (dilim 7/39).
#
# Yapı:
#   1. main branch'e push → otomatik deploy.
#   2. Manuel tetikleme (workflow_dispatch) da var.
#   3. İki job: build (Node 22, npm ci → npm run validate → npm run typecheck →
#      npm run build) → deploy (GitHub Pages artifact upload + deploy-pages action).
#   4. BASE_PATH env'i otomatik repo adından türetilir (`${{ github.event.repository.name }}`).
#      Custom domain kullanılıyorsa, deploy step'inde BASE_PATH=/ olarak override edilebilir
#      (workflow_dispatch input ile).
#
# İlk kullanım için repo settings:
#   Settings → Pages → Source: "GitHub Actions"
#   (Branch'tan deploy etmiyoruz; workflow Pages'a artifact yükler.)

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      custom_domain:
        description: 'Custom domain kullanılıyor mu? (Evet ise base path / olur)'
        required: false
        default: 'false'
        type: choice
        options: ['false', 'true']

# GitHub Pages için gerekli permissions
permissions:
  contents: read
  pages: write
  id-token: write

# Aynı anda tek deploy çalışsın; yeni push gelirse beklemekte olanı iptal etme
concurrency:
  group: 'pages'
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Validate corpus invariants
        run: npm run validate

      - name: Type-check
        run: npm run typecheck

      - name: Build
        env:
          # BASE_PATH: custom domain ise '/', değilse '/<repo-name>/'
          BASE_PATH: ${{ inputs.custom_domain == 'true' && '/' || format('/{0}/', github.event.repository.name) }}
        run: npm run build

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
